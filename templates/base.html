<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Skepticamp NYC — Share the Apple of Knowledge{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}A free, one-day unconference at the intersection of science and critical thinking. New York City, December 6, 2025.{% endblock %}">

  <!-- Theme script: MUST run before body renders to prevent flash -->
  <script>
    (function () {
      var stored = localStorage.getItem('skepcamp_theme');
      var preferred = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.className = preferred;
    })();
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

  <!-- SVG Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230D0F1A'/><text x='6' y='24' font-family='serif' font-size='22' fill='%234FAAFF'>S</text></svg>">

  {% load static %}
  <link rel="stylesheet" href="{% static 'css/tokens.css' %}">
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
  <link rel="stylesheet" href="{% static 'css/components.css' %}">
  <link rel="stylesheet" href="{% static 'css/animations.css' %}">
  <link rel="stylesheet" href="{% static 'css/pages.css' %}">
  {% block extra_css %}{% endblock %}
</head>
<body>
  <!-- Skip to main content (ADA) -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  {% include "includes/nav.html" %}

  <!-- Cookie consent (Vue mounts here) -->
  <div id="cookie-consent-mount"></div>

  <!-- Screen reader live region for wizard step announcements -->
  <div aria-live="polite" aria-atomic="true" class="sr-only" id="aria-announcer"></div>

  <main id="main-content">
    {% block content %}{% endblock %}
  </main>

  {% include "includes/footer.html" %}

  {% block extra_js %}{% endblock %}

  <!-- Vue components — loads ThemeToggle, CookieConsent, RegistrationWizard, etc. -->
  {% load vite %}
  {% vite_asset "frontend/main.js" %}

  <!-- Fallback: minimal theme toggle JS if Vue bundle not built yet -->
  <script>
    // Nav scroll behavior
    (function () {
      var nav = document.getElementById('main-nav');
      if (!nav) return;
      function updateNav() {
        if (window.scrollY > 20) {
          nav.classList.remove('nav--at-top');
          nav.classList.add('nav--scrolled');
        } else {
          nav.classList.add('nav--at-top');
          nav.classList.remove('nav--scrolled');
        }
      }
      window.addEventListener('scroll', updateNav, { passive: true });
      updateNav();

      // Hide scroll indicator
      var scrollIndicator = document.querySelector('.scroll-indicator-wrap');
      if (scrollIndicator) {
        window.addEventListener('scroll', function () {
          if (window.scrollY > 50) {
            scrollIndicator.querySelector('.scroll-indicator')?.classList.add('is-hidden');
          }
        }, { passive: true, once: true });
      }
    })();

    // Mobile menu
    (function () {
      var btn = document.getElementById('hamburger-btn');
      var menu = document.getElementById('mobile-menu');
      if (!btn || !menu) return;

      function openMenu() {
        menu.removeAttribute('hidden');
        menu.classList.add('is-open');
        btn.setAttribute('aria-expanded', 'true');
        document.body.style.overflow = 'hidden';
        // Focus first link
        var firstLink = menu.querySelector('a, button');
        if (firstLink) firstLink.focus();
      }

      function closeMenu() {
        menu.classList.remove('is-open');
        btn.setAttribute('aria-expanded', 'false');
        document.body.style.overflow = '';
        setTimeout(function () { menu.setAttribute('hidden', ''); }, 400);
        btn.focus();
      }

      btn.addEventListener('click', function () {
        if (menu.hasAttribute('hidden')) { openMenu(); } else { closeMenu(); }
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && !menu.hasAttribute('hidden')) closeMenu();
      });

      menu.querySelectorAll('a').forEach(function (link) {
        link.addEventListener('click', closeMenu);
      });
    })();

    // Reveal on scroll
    (function () {
      if (!window.IntersectionObserver) return;
      var els = document.querySelectorAll('.reveal');
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            io.unobserve(entry.target);
          }
        });
      }, { threshold: 0.15 });
      els.forEach(function (el) { io.observe(el); });
    })();
  </script>
</body>
</html>

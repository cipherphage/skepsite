<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Gateway decoration: welcoming open door with light -->
  <defs>
    <linearGradient id="door-light" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#4FAAFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#C084FC" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Light rays from door -->
  <path d="M60 30 L20 110 L100 110 Z" fill="url(#door-light)"/>

  <!-- Door frame -->
  <rect x="38" y="20" width="44" height="70" rx="4" fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-opacity="0.15" stroke-width="1.5"/>

  <!-- Open door (slightly ajar) -->
  <path d="M82 20 L78 90 L48 90 L48 20 Z" fill="currentColor" fill-opacity="0.05" stroke="currentColor" stroke-opacity="0.12" stroke-width="1"/>

  <!-- Door handle -->
  <circle cx="52" cy="58" r="2.5" fill="#4FAAFF" opacity="0.6"/>

  <!-- Welcome sparkles -->
  <circle cx="60" cy="45" r="2" fill="#FBBF24" opacity="0.4"/>
  <circle cx="70" cy="35" r="1.5" fill="#4FAAFF" opacity="0.3"/>
  <circle cx="50" cy="38" r="1.5" fill="#C084FC" opacity="0.3"/>
  <circle cx="65" cy="50" r="1" fill="#34D399" opacity="0.3"/>

  <!-- Steps -->
  <rect x="35" y="90" width="50" height="6" rx="2" fill="currentColor" fill-opacity="0.06"/>
  <rect x="30" y="96" width="60" height="6" rx="2" fill="currentColor" fill-opacity="0.04"/>
  <rect x="25" y="102" width="70" height="6" rx="2" fill="currentColor" fill-opacity="0.03"/>
</svg>

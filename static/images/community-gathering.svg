<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" fill="none">
  <!-- Community gathering illustration: abstract people in a circle of discussion -->
  <defs>
    <linearGradient id="cg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4FAAFF"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
    <linearGradient id="cg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="240" cy="160" r="140" fill="url(#cg1)" fill-opacity="0.04" stroke="url(#cg1)" stroke-width="1" stroke-opacity="0.1"/>
  <circle cx="240" cy="160" r="100" fill="none" stroke="url(#cg1)" stroke-width="0.5" stroke-opacity="0.08" stroke-dasharray="4 4"/>
  <!-- Abstract people figures arranged in a circle -->
  <!-- Person 1 - top -->
  <circle cx="240" cy="60" r="10" fill="#4FAAFF" fill-opacity="0.6"/>
  <path d="M228 80a12 12 0 0124 0" fill="#4FAAFF" fill-opacity="0.3"/>
  <!-- Person 2 - top right -->
  <circle cx="330" cy="95" r="10" fill="#C084FC" fill-opacity="0.6"/>
  <path d="M318 115a12 12 0 0124 0" fill="#C084FC" fill-opacity="0.3"/>
  <!-- Person 3 - right -->
  <circle cx="360" cy="170" r="10" fill="#34D399" fill-opacity="0.6"/>
  <path d="M348 190a12 12 0 0124 0" fill="#34D399" fill-opacity="0.3"/>
  <!-- Person 4 - bottom right -->
  <circle cx="320" cy="240" r="10" fill="#FBBF24" fill-opacity="0.6"/>
  <path d="M308 260a12 12 0 0124 0" fill="#FBBF24" fill-opacity="0.3"/>
  <!-- Person 5 - bottom -->
  <circle cx="240" cy="260" r="10" fill="#4FAAFF" fill-opacity="0.6"/>
  <path d="M228 280a12 12 0 0124 0" fill="#4FAAFF" fill-opacity="0.3"/>
  <!-- Person 6 - bottom left -->
  <circle cx="160" cy="240" r="10" fill="#C084FC" fill-opacity="0.6"/>
  <path d="M148 260a12 12 0 0124 0" fill="#C084FC" fill-opacity="0.3"/>
  <!-- Person 7 - left -->
  <circle cx="120" cy="170" r="10" fill="#34D399" fill-opacity="0.6"/>
  <path d="M108 190a12 12 0 0124 0" fill="#34D399" fill-opacity="0.3"/>
  <!-- Person 8 - top left -->
  <circle cx="150" cy="95" r="10" fill="#FBBF24" fill-opacity="0.6"/>
  <path d="M138 115a12 12 0 0124 0" fill="#FBBF24" fill-opacity="0.3"/>
  <!-- Center: microphone / podium symbol -->
  <rect x="234" y="140" width="12" height="30" rx="6" fill="url(#cg1)" fill-opacity="0.5"/>
  <line x1="240" y1="170" x2="240" y2="185" stroke="url(#cg1)" stroke-width="2" stroke-opacity="0.5"/>
  <path d="M232 185h16" stroke="url(#cg1)" stroke-width="2" stroke-opacity="0.5" stroke-linecap="round"/>
  <!-- Speech/thought waves -->
  <path d="M255 145c5-3 10-3 15 0" stroke="#4FAAFF" stroke-width="1" stroke-opacity="0.3" fill="none" stroke-linecap="round"/>
  <path d="M258 138c8-4 14-4 22 0" stroke="#4FAAFF" stroke-width="1" stroke-opacity="0.2" fill="none" stroke-linecap="round"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Community illustration: diverse group of people connected -->
  <defs>
    <linearGradient id="comm-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4FAAFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#C084FC" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="200" cy="200" r="190" fill="url(#comm-grad)"/>

  <!-- Central connecting lines (network) -->
  <line x1="200" y1="120" x2="130" y2="200" stroke="#4FAAFF" stroke-opacity="0.15" stroke-width="1.5"/>
  <line x1="200" y1="120" x2="270" y2="200" stroke="#4FAAFF" stroke-opacity="0.15" stroke-width="1.5"/>
  <line x1="130" y1="200" x2="170" y2="290" stroke="#C084FC" stroke-opacity="0.15" stroke-width="1.5"/>
  <line x1="270" y1="200" x2="230" y2="290" stroke="#C084FC" stroke-opacity="0.15" stroke-width="1.5"/>
  <line x1="130" y1="200" x2="270" y2="200" stroke="#34D399" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="170" y1="290" x2="230" y2="290" stroke="#34D399" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="200" y1="120" x2="170" y2="290" stroke="#4FAAFF" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="200" y1="120" x2="230" y2="290" stroke="#C084FC" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Person: top center (speaker) -->
  <circle cx="200" cy="105" r="22" fill="#4FAAFF" opacity="0.5"/>
  <circle cx="200" cy="95" r="10" fill="#4FAAFF" opacity="0.7"/>
  <rect x="188" y="108" width="24" height="22" rx="8" fill="#4FAAFF" opacity="0.4"/>
  <!-- Lightbulb above -->
  <circle cx="200" cy="65" r="8" fill="#FBBF24" opacity="0.3" stroke="#FBBF24" stroke-opacity="0.5" stroke-width="1"/>
  <line x1="197" y1="73" x2="197" y2="76" stroke="#FBBF24" stroke-opacity="0.4" stroke-width="1"/>
  <line x1="200" y1="73" x2="200" y2="78" stroke="#FBBF24" stroke-opacity="0.4" stroke-width="1"/>
  <line x1="203" y1="73" x2="203" y2="76" stroke="#FBBF24" stroke-opacity="0.4" stroke-width="1"/>

  <!-- Person: left -->
  <circle cx="118" cy="195" r="22" fill="#C084FC" opacity="0.5"/>
  <circle cx="118" cy="185" r="10" fill="#C084FC" opacity="0.7"/>
  <rect x="106" y="198" width="24" height="22" rx="8" fill="#C084FC" opacity="0.4"/>

  <!-- Person: right -->
  <circle cx="282" cy="195" r="22" fill="#34D399" opacity="0.5"/>
  <circle cx="282" cy="185" r="10" fill="#34D399" opacity="0.7"/>
  <rect x="270" y="198" width="24" height="22" rx="8" fill="#34D399" opacity="0.4"/>

  <!-- Person: bottom left -->
  <circle cx="160" cy="285" r="20" fill="#4FAAFF" opacity="0.4"/>
  <circle cx="160" cy="276" r="9" fill="#4FAAFF" opacity="0.6"/>
  <rect x="149" y="288" width="22" height="20" rx="7" fill="#4FAAFF" opacity="0.35"/>

  <!-- Person: bottom right -->
  <circle cx="240" cy="285" r="20" fill="#C084FC" opacity="0.4"/>
  <circle cx="240" cy="276" r="9" fill="#C084FC" opacity="0.6"/>
  <rect x="229" y="288" width="22" height="20" rx="7" fill="#C084FC" opacity="0.35"/>

  <!-- Speech bubbles -->
  <rect x="230" y="80" width="40" height="20" rx="10" fill="#4FAAFF" opacity="0.15"/>
  <rect x="60" y="175" width="35" height="18" rx="9" fill="#C084FC" opacity="0.15"/>
  <rect x="305" y="180" width="42" height="18" rx="9" fill="#34D399" opacity="0.15"/>

  <!-- Floating knowledge symbols -->
  <text x="85" y="140" font-family="serif" font-size="14" fill="#4FAAFF" opacity="0.2">E=mc2</text>
  <text x="290" y="130" font-family="serif" font-size="12" fill="#C084FC" opacity="0.2">DNA</text>
  <text x="310" y="310" font-family="serif" font-size="11" fill="#34D399" opacity="0.2">atoms</text>
  <text x="70" y="300" font-family="serif" font-size="13" fill="#FBBF24" opacity="0.2">logic</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <!-- Hero illustration: Community gathering / unconference scene -->
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4FAAFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#C084FC" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="podium-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4FAAFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4FAAFF" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="person-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#4FAAFF"/>
    </linearGradient>
  </defs>

  <!-- Background shape -->
  <rect width="600" height="400" rx="24" fill="url(#bg-grad)"/>

  <!-- Presentation screen -->
  <rect x="210" y="40" width="180" height="110" rx="8" fill="currentColor" fill-opacity="0.06" stroke="currentColor" stroke-opacity="0.12" stroke-width="1.5"/>
  <!-- Screen content: chart bars -->
  <rect x="230" y="100" width="20" height="35" rx="3" fill="#4FAAFF" opacity="0.4"/>
  <rect x="260" y="80" width="20" height="55" rx="3" fill="#4FAAFF" opacity="0.6"/>
  <rect x="290" y="90" width="20" height="45" rx="3" fill="#C084FC" opacity="0.5"/>
  <rect x="320" y="70" width="20" height="65" rx="3" fill="#C084FC" opacity="0.7"/>
  <rect x="350" y="85" width="20" height="50" rx="3" fill="#34D399" opacity="0.5"/>
  <!-- Screen stand -->
  <rect x="290" y="150" width="20" height="30" rx="2" fill="currentColor" fill-opacity="0.08"/>
  <rect x="265" y="178" width="70" height="6" rx="3" fill="currentColor" fill-opacity="0.1"/>

  <!-- Speaker at podium -->
  <circle cx="300" cy="220" r="18" fill="url(#person-grad)" opacity="0.7"/>
  <rect x="286" y="238" width="28" height="40" rx="8" fill="url(#person-grad)" opacity="0.5"/>
  <!-- Podium -->
  <rect x="270" y="270" width="60" height="50" rx="6" fill="url(#podium-grad)"/>

  <!-- Audience members - row 1 -->
  <circle cx="100" cy="280" r="14" fill="#4FAAFF" opacity="0.3"/>
  <rect x="89" y="294" width="22" height="30" rx="6" fill="#4FAAFF" opacity="0.2"/>

  <circle cx="150" cy="275" r="14" fill="#C084FC" opacity="0.3"/>
  <rect x="139" y="289" width="22" height="30" rx="6" fill="#C084FC" opacity="0.2"/>

  <circle cx="200" cy="280" r="14" fill="#34D399" opacity="0.3"/>
  <rect x="189" y="294" width="22" height="30" rx="6" fill="#34D399" opacity="0.2"/>

  <circle cx="400" cy="280" r="14" fill="#34D399" opacity="0.3"/>
  <rect x="389" y="294" width="22" height="30" rx="6" fill="#34D399" opacity="0.2"/>

  <circle cx="450" cy="275" r="14" fill="#4FAAFF" opacity="0.3"/>
  <rect x="439" y="289" width="22" height="30" rx="6" fill="#4FAAFF" opacity="0.2"/>

  <circle cx="500" cy="280" r="14" fill="#C084FC" opacity="0.3"/>
  <rect x="489" y="294" width="22" height="30" rx="6" fill="#C084FC" opacity="0.2"/>

  <!-- Audience - row 2 -->
  <circle cx="120" cy="340" r="12" fill="#C084FC" opacity="0.2"/>
  <circle cx="170" cy="335" r="12" fill="#4FAAFF" opacity="0.2"/>
  <circle cx="220" cy="340" r="12" fill="#34D399" opacity="0.2"/>
  <circle cx="380" cy="340" r="12" fill="#4FAAFF" opacity="0.2"/>
  <circle cx="430" cy="335" r="12" fill="#C084FC" opacity="0.2"/>
  <circle cx="480" cy="340" r="12" fill="#34D399" opacity="0.2"/>

  <!-- Speech/thought bubbles from speaker -->
  <circle cx="340" cy="200" r="4" fill="#4FAAFF" opacity="0.3"/>
  <circle cx="355" cy="188" r="6" fill="#4FAAFF" opacity="0.25"/>
  <circle cx="375" cy="172" r="10" fill="#4FAAFF" opacity="0.2"/>

  <!-- Question marks floating (skepticism) -->
  <text x="80" y="250" font-family="'DM Serif Display', Georgia, serif" font-size="20" fill="#C084FC" opacity="0.2">?</text>
  <text x="520" y="260" font-family="'DM Serif Display', Georgia, serif" font-size="24" fill="#4FAAFF" opacity="0.2">?</text>
  <text x="540" y="230" font-family="'DM Serif Display', Georgia, serif" font-size="16" fill="#34D399" opacity="0.2">?</text>

  <!-- Decorative dots -->
  <circle cx="50" cy="50" r="3" fill="#4FAAFF" opacity="0.15"/>
  <circle cx="550" cy="60" r="3" fill="#C084FC" opacity="0.15"/>
  <circle cx="40" cy="360" r="2" fill="#34D399" opacity="0.15"/>
  <circle cx="560" cy="350" r="2" fill="#4FAAFF" opacity="0.15"/>
</svg>
